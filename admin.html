<!DOCTYPE html>
<html lang="id" data-mode="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · Padzli & Miskah</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Patrick+Hand&display=swap" rel="stylesheet" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#FF9F1C" />
<link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="assets/theme.css" />
<style>
  .ahead{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
    padding:14px clamp(16px,4vw,32px);background:color-mix(in srgb,var(--paper) 78%,transparent);
    backdrop-filter:blur(12px);border-bottom:3px solid var(--ink)}
  .ahead .b{font-family:'Patrick Hand';font-size:21px;color:var(--ink);display:flex;align-items:center;gap:9px}
  .ahead .b .tag{font-family:'Comic Neue';font-weight:700;font-size:11px;background:var(--accent);color:#fff;
    border:2px solid var(--ink);border-radius:100px;padding:2px 9px}
  .ahead .acts{display:flex;gap:10px}

  /* login */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;position:relative;z-index:5}
  .loginbox{max-width:400px;width:100%;padding:38px 34px;text-align:center}
  .loginbox .lock{width:72px;height:72px;border-radius:50%;background:var(--primary);border:3px solid var(--ink);
    box-shadow:5px 5px 0 var(--shadow);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 18px}
  .loginbox h1{font-size:34px;color:var(--ink)}
  .loginbox p{color:var(--muted);margin-top:8px;font-size:14px;line-height:1.5}
  .loginbox input{width:100%;margin-top:22px;font-family:'Comic Neue';font-weight:700;font-size:16px;
    text-align:center;padding:14px;border:3px solid var(--ink);border-radius:12px;background:var(--card);color:var(--ink);
    box-shadow:inset 3px 3px 0 rgba(0,0,0,.06)}
  .loginbox input:focus{outline:none;border-color:var(--accent)}
  .loginbox .err{color:var(--accent);font-family:'Caveat';font-weight:700;font-size:18px;margin-top:12px;min-height:24px}

  /* panel */
  .panel{position:relative;z-index:5;max-width:880px;margin:0 auto;
    padding:96px 20px calc(140px + env(safe-area-inset-bottom))}
  @media(max-width:560px){ .panel{ padding-bottom:calc(180px + env(safe-area-inset-bottom)) } }
  .tabbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;position:sticky;top:74px;z-index:6;
    background:color-mix(in srgb,var(--paper) 80%,transparent);backdrop-filter:blur(8px);padding:8px;
    border:3px solid var(--ink);border-radius:14px;box-shadow:5px 5px 0 var(--shadow)}
  .tab{font-family:'Patrick Hand';font-size:15px;cursor:pointer;padding:7px 14px;border-radius:9px;
    border:2.5px solid transparent;color:var(--ink)}
  .tab.active{background:var(--primary);border-color:var(--ink);box-shadow:3px 3px 0 var(--shadow)}
  .tabpane{display:none}.tabpane.active{display:block}

  .field{margin-bottom:16px}
  .field label{display:block;font-family:'Patrick Hand';font-size:16px;color:var(--ink);margin-bottom:6px}
  .field input,.field textarea{width:100%;font-family:'Comic Neue';font-weight:400;font-size:15px;
    padding:11px 13px;border:2.5px solid var(--ink);border-radius:10px;background:var(--card);color:var(--ink)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .field textarea{min-height:96px;resize:vertical;line-height:1.5}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}

  .item{padding:20px;margin-bottom:18px;position:relative}
  .item .rm{position:absolute;top:-12px;right:-12px;width:34px;height:34px;border-radius:50%;
    background:var(--accent);color:#fff;border:2.5px solid var(--ink);cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;box-shadow:3px 3px 0 var(--shadow)}
  .item .idx{font-family:'Caveat';font-weight:700;font-size:18px;color:var(--accent);margin-bottom:10px}
  .addbtn{cursor:pointer;width:100%;padding:14px;font-family:'Patrick Hand';font-size:16px;color:var(--ink);
    background:var(--card);border:3px dashed var(--ink);border-radius:12px;text-align:center}
  .addbtn:hover{background:var(--primary)}

  .savebar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:14px clamp(16px,4vw,32px) calc(14px + env(safe-area-inset-bottom));
    background:var(--card);border-top:3px solid var(--ink);flex-wrap:wrap}
  .savebar .note{font-family:'Caveat';font-weight:600;font-size:17px;color:var(--muted);flex:1;min-width:140px}
  .savebar .saved{color:#2e8b57}
  @media(max-width:560px){
    .savebar{padding:10px 14px calc(10px + env(safe-area-inset-bottom));gap:8px}
    .savebar .note{display:none}
    .savebar .acts{flex:1;display:flex;gap:8px}
    .savebar .acts > .btn{flex:1;justify-content:center;font-size:14px !important;padding:10px 12px !important}
  }
  .secthead{font-family:'Patrick Hand';font-size:24px;color:var(--ink);margin:4px 0 16px;display:flex;align-items:center;gap:10px}
  .hint{font-family:'Caveat';font-weight:600;font-size:16px;color:var(--muted);margin-bottom:18px;
    background:var(--card);border:2.5px dashed var(--ink);border-radius:12px;padding:12px 16px}
</style>
</head>
<body data-page="admin" data-nav="off">

  <!-- header -->
  <div class="ahead" id="ahead" style="display:none">
    <div class="b">⚙️ Panel Admin <span class="tag">PRIVAT</span></div>
    <div class="acts">
      <div class="iconbtn" id="modeBtn2"><span class="ic" id="modeIc2">☀️</span></div>
      <a class="iconbtn" href="index.html" data-link><span class="ic">🏠</span> Situs</a>
      <div class="iconbtn" id="logoutBtn"><span class="ic">🚪</span> Keluar</div>
    </div>
  </div>

  <!-- login -->
  <div class="login" id="login">
    <div class="loginbox nbox tilt-l">
      <div class="lock">🔒</div>
      <h1>Khusus Berdua</h1>
      <p>Halaman privat untuk mengelola konten album. Masuk dengan email &amp; password admin.</p>
      <input type="email" id="user" placeholder="email" autocomplete="username" inputmode="email" />
      <input type="password" id="pass" placeholder="password" autocomplete="current-password" style="margin-top:12px" />
      <div class="err" id="err"></div>
      <button class="btn" id="loginBtn" style="margin-top:18px;width:100%;justify-content:center">Masuk ❤</button>
    </div>
  </div>

  <!-- panel -->
  <div class="panel" id="panel" style="display:none">
    <div class="tabbar" id="tabbar"></div>
    <div id="panes"></div>
  </div>

  <div class="savebar" id="savebar" style="display:none">
    <span class="note" id="saveNote">Tekan <b>Simpan</b> untuk push perubahan ke cloud.</span>
    <div class="acts" style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn ghost" id="resetBtn" style="font-size:15px;padding:10px 18px">↺ Reset</button>
      <button class="btn" id="saveBtn" style="font-size:17px;padding:11px 26px">💾 Simpan</button>
    </div>
  </div>

<script type="module" src="assets/cloud.js"></script><script src="assets/site.js"></script>
<script>
  const root=document.documentElement;
  let data=window.PM.get();

  /* mode toggle */
  const mIc=document.getElementById('modeIc2');
  function syncMode(){mIc.textContent=root.getAttribute('data-mode')==='dark'?'🌙':'☀️';}
  syncMode();
  document.getElementById('modeBtn2').addEventListener('click',()=>{
    const m=root.getAttribute('data-mode')==='dark'?'light':'dark';root.setAttribute('data-mode',m);localStorage.setItem('pm-mode',m);syncMode();
  });

  /* ---- login ---- */
  const loginEl=document.getElementById('login'),panel=document.getElementById('panel');
  function showApp(){
    loginEl.style.display='none';panel.style.display='block';
    document.getElementById('savebar').style.display='flex';
    document.getElementById('ahead').style.display='flex';
    buildTabs();
  }
  /* Auto-restore session moved to bottom of script — must run AFTER
     const TABS is initialized to avoid Temporal Dead Zone crash. */
  /* Auth is validated SERVER-SIDE by PocketBase (_superusers). No password
     is ever compared in the browser or shipped to clients. */
  async function tryLogin(){
    const email=document.getElementById('user').value.trim();
    const p=document.getElementById('pass').value;
    const errEl=document.getElementById('err');
    errEl.textContent='';
    if(!window.CLOUD || !window.CLOUD.adminLogin){
      errEl.textContent='Cloud belum siap, coba sebentar lagi.'; return;
    }
    const btn=document.getElementById('loginBtn');
    const label=btn.textContent; btn.disabled=true; btn.textContent='Memeriksa…';
    try{
      await window.CLOUD.adminLogin(email,p);
      showApp();
    }catch(e){
      errEl.textContent='Email / password salah 🙈';
    }finally{
      btn.disabled=false; btn.textContent=label;
    }
  }
  document.getElementById('loginBtn').addEventListener('click',tryLogin);
  document.getElementById('user').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
  document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
  document.getElementById('logoutBtn').addEventListener('click',()=>{
    if(window.CLOUD && window.CLOUD.adminLogout) window.CLOUD.adminLogout();
    location.reload();
  });

  /* ---- builders ---- */
  function field(label,val,oninput,type='text'){
    const f=document.createElement('div');f.className='field';
    const tag=type==='area'?'textarea':'input';
    f.innerHTML=`<label>${label}</label>`;
    const inp=document.createElement(tag);
    if(type!=='area')inp.type=type; inp.value=val??'';
    inp.addEventListener('input',()=>oninput(inp.value));
    f.appendChild(inp);return f;
  }
  /* uploadField: pick file from device → upload to PocketBase → store file URL
     kind = 'img' | 'vid' | 'aud' (controls accept + preview + folder) */
  function uploadField(label,val,oninput,kind){
    const accept = kind==='vid' ? 'video/*' : kind==='aud' ? 'audio/*' : 'image/*';
    const folder = kind==='vid' ? 'album-v2/videos' : kind==='aud' ? 'album-v2/audio' : 'album-v2/images';
    const f=document.createElement('div');f.className='field';
    f.innerHTML=`<label>${label}</label>`;
    const wrap=document.createElement('div');wrap.className='upfield';
    const preview=document.createElement('div');preview.className='preview';
    const ctrls=document.createElement('div');ctrls.className='controls';
    let current = val || '';
    function renderPreview(){
      if(!current){ preview.innerHTML = `<span>belum<br>diupload</span>`; return; }
      if(kind==='vid') preview.innerHTML = `<video src="${current}" muted></video>`;
      else if(kind==='aud') preview.innerHTML = `<span style="font-size:28px">🎵</span>`;
      else             preview.innerHTML = `<img src="${current}" alt=""/>`;
    }
    renderPreview();
    const pick=document.createElement('label');pick.className='pickbtn';
    pick.innerHTML=`<span>📤 Pilih ${kind==='vid'?'video':kind==='aud'?'lagu':'gambar'}</span>`;
    const fileInp=document.createElement('input');fileInp.type='file';fileInp.accept=accept;
    pick.appendChild(fileInp);
    const status=document.createElement('div');status.className='status';
    status.textContent = current ? 'Siap. Pilih file baru untuk ganti.' : '';
    fileInp.addEventListener('change', async ()=>{
      const file = fileInp.files[0]; if(!file) return;
      if(!window.CLOUD || !window.CLOUD.upload){
        status.textContent='Cloud belum siap, coba ulangi sebentar.'; status.className='status err';
        return;
      }
      status.textContent=`Mengunggah… ${(file.size/1024/1024).toFixed(1)}MB`;
      status.className='status';
      try{
        const url = await window.CLOUD.upload(file, folder);
        current = url; oninput(url); renderPreview();
        status.textContent='✓ Berhasil diunggah'; status.className='status ok';
      }catch(e){
        status.textContent='✗ Gagal: '+(e.message||e); status.className='status err';
      }
    });
    const clear=document.createElement('button');clear.className='clear';clear.type='button';
    clear.textContent='Hapus file';
    clear.addEventListener('click',()=>{
      current=''; oninput(''); renderPreview();
      status.textContent='File dihapus dari entri ini.'; status.className='status';
    });
    ctrls.appendChild(pick); ctrls.appendChild(status); ctrls.appendChild(clear);
    wrap.appendChild(preview); wrap.appendChild(ctrls);
    f.appendChild(wrap);
    return f;
  }
  function listEditor(pane,title,hint,arr,fields,blank){
    const h=document.createElement('div');h.className='secthead';h.textContent=title;pane.appendChild(h);
    if(hint){const hh=document.createElement('div');hh.className='hint';hh.textContent=hint;pane.appendChild(hh);}
    const host=document.createElement('div');pane.appendChild(host);
    function render(){
      host.innerHTML='';
      arr.forEach((item,i)=>{
        const card=document.createElement('div');card.className='item nbox';
        const idx=document.createElement('div');idx.className='idx';idx.textContent='#'+(i+1);card.appendChild(idx);
        const rm=document.createElement('button');rm.className='rm';rm.textContent='✕';
        rm.addEventListener('click', async ()=>{
          const ok = await window.PM.confirm({title:'Hapus entri?',body:'Entri ini akan dihilangkan. Tetap simpan untuk push ke cloud.',okText:'Hapus',cancelText:'Batal'});
          if(ok){arr.splice(i,1);render();}
        });
        card.appendChild(rm);
        fields.forEach(fd=>{
          if(fd.type==='upload-img' || fd.type==='upload-vid' || fd.type==='upload-aud'){
            const kind = fd.type==='upload-vid'?'vid':fd.type==='upload-aud'?'aud':'img';
            card.appendChild(uploadField(fd.label,item[fd.key],v=>item[fd.key]=v,kind));
          } else {
            card.appendChild(field(fd.label,item[fd.key],v=>item[fd.key]=fd.num?(+v):v,fd.type||'text'));
          }
        });
        host.appendChild(card);
      });
      const add=document.createElement('div');add.className='addbtn';add.textContent='＋ Tambah '+title;
      add.addEventListener('click',()=>{arr.push(structuredClone(blank));render();});
      host.appendChild(add);
    }
    render();
  }

  const TABS=[
    {k:'couple',t:'Pasangan'},
    {k:'counter',t:'Counter'},
    {k:'timeline',t:'Timeline'},
    {k:'gallery',t:'Galeri'},
    {k:'notes',t:'Surat'},
    {k:'moments',t:'Momen'},
    {k:'videos',t:'Video'},
    {k:'songs',t:'Lagu'}
  ];
  function buildTabs(){
    const tabbar=document.getElementById('tabbar'),panes=document.getElementById('panes');
    tabbar.innerHTML='';panes.innerHTML='';
    TABS.forEach((tb,i)=>{
      const t=document.createElement('div');t.className='tab'+(i===0?' active':'');t.textContent=tb.t;
      t.addEventListener('click',()=>{
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        document.querySelectorAll('.tabpane').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');document.getElementById('pane-'+tb.k).classList.add('active');
      });
      tabbar.appendChild(t);
      const pane=document.createElement('div');pane.className='tabpane'+(i===0?' active':'');pane.id='pane-'+tb.k;
      panes.appendChild(pane);buildPane(tb.k,pane);
    });
  }

  function buildPane(k,pane){
    if(k==='couple'){
      pane.innerHTML='<div class="secthead">Identitas Pasangan</div>';
      pane.appendChild(field('Nama 1',data.couple.name1,v=>data.couple.name1=v));
      pane.appendChild(field('Nama 2',data.couple.name2,v=>data.couple.name2=v));
      pane.appendChild(field('Tanggal Jadian (untuk hitungan utama)',data.couple.since,v=>data.couple.since=v,'date'));
      pane.appendChild(field('Kutipan / Tagline (di halaman depan)',data.couple.tagline,v=>data.couple.tagline=v,'area'));
    }
    else if(k==='counter')
      listEditor(pane,'Milestone Counter','Kartu “sekian hari sejak …” di halaman Our Story.',data.counter,
        [{label:'Label',key:'label'},{label:'Tanggal',key:'date',type:'date'}],{label:'Momen Baru',date:'2022-01-01'});
    else if(k==='timeline')
      listEditor(pane,'Garis Waktu','Tiap entri jadi satu kartu di timeline Our Story. Upload foto opsional.',data.timeline,
        [{label:'Tanggal',key:'date',type:'date'},{label:'Judul',key:'title'},{label:'Cerita',key:'story',type:'area'},{label:'Foto Momen',key:'img',type:'upload-img'}],
        {date:'2022-01-01',title:'Judul Momen',story:'Ceritanya di sini…',img:''});
    else if(k==='gallery')
      listEditor(pane,'Galeri','Caption + foto. Upload langsung dari device-mu.',data.gallery,
        [{label:'Caption',key:'cap'},{label:'Foto',key:'img',type:'upload-img'}],{cap:'Kenangan baru',tall:false,img:''});
    else if(k==='notes')
      listEditor(pane,'Surat & Pesan','Surat cinta yang muncul dengan efek ketik.',data.notes,
        [{label:'Judul',key:'title'},{label:'Dari',key:'from'},{label:'Isi Surat',key:'body',type:'area'}],
        {title:'Surat Baru',from:'Penulis',body:'Tulis isi suratnya di sini…'});
    else if(k==='moments')
      listEditor(pane,'Momen Spesial','Emoji + judul + tanggal + deskripsi + foto.',data.moments,
        [{label:'Emoji',key:'emoji'},{label:'Judul',key:'title'},{label:'Tanggal',key:'date',type:'date'},{label:'Deskripsi',key:'desc',type:'area'},{label:'Foto',key:'img',type:'upload-img'}],
        {emoji:'✨',title:'Momen Baru',date:'2022-01-01',desc:'Deskripsi singkat…',img:''});
    else if(k==='videos')
      listEditor(pane,'Video','Upload file video langsung. Cover opsional (jika kosong dipakai poster otomatis).',data.videos,
        [{label:'Judul',key:'title'},{label:'Tahun',key:'date'},{label:'Deskripsi',key:'desc',type:'area'},{label:'File Video',key:'video',type:'upload-vid'},{label:'Thumbnail (opsional)',key:'cover',type:'upload-img'}],
        {title:'Video Baru',date:'2024',desc:'Deskripsi singkat…',video:'',cover:''});
    else if(k==='songs'){
      if(!Array.isArray(data.playlist)) data.playlist=[];
      listEditor(pane,'Playlist Lagu','Paste link YouTube atau Spotify (track URL). Bisa juga link MP3 langsung. Player akan otomatis pakai engine yang sesuai.',data.playlist,
        [
          {label:'Judul',key:'title'},
          {label:'Artis / Penyanyi',key:'artist'},
          {label:'Link YouTube / Spotify / MP3', key:'url'}
        ],
        {title:'Lagu Baru',artist:'',url:''});
    }
  }

  /* ---- save / reset ---- */
  function flash(msg,ok){const n=document.getElementById('saveNote');n.innerHTML=msg;n.classList.toggle('saved',!!ok);
    setTimeout(()=>{n.innerHTML='Tekan <b>Simpan</b> untuk push perubahan ke cloud.';n.classList.remove('saved');},2600);}
  document.getElementById('saveBtn').addEventListener('click',()=>{
    window.PM.save(data);
    flash('✓ Tersimpan & ter-sync ke semua perangkat.',true);
    window.PM.notify('Perubahan tersimpan & ter-sync ke cloud',{kind:'ok'});
  });
  document.getElementById('resetBtn').addEventListener('click',async ()=>{
    const ok = await window.PM.confirm({
      title:'Reset ke contoh awal?',
      body:'Semua perubahan yang belum di-push ke cloud akan hilang dari layar. Untuk benar-benar menggantikan data di cloud, tekan Simpan setelah reset.',
      icon:'↺', okText:'Reset', cancelText:'Batal'
    });
    if(!ok) return;
    window.PM.reset(); data=window.PM.get(); buildTabs();
    flash('↺ Dikembalikan ke default.',false);
    window.PM.notify('Direset ke default lokal',{kind:'ok'});
  });

  /* Auto-restore session — MUST be at bottom so const TABS is initialized.
     Without this, refresh-after-login crashed buildTabs with a TDZ ReferenceError
     leaving the tabbar empty. PocketBase persists the auth token, so a valid
     superuser session survives reloads. cloud.js is a module (loads AFTER this
     inline script), so wait for its 'cloud-init' event if it isn't ready yet. */
  function restoreSession(){
    if(window.CLOUD && window.CLOUD.isAdmin && window.CLOUD.isAdmin()) showApp();
  }
  if(window.CLOUD) restoreSession();
  else window.addEventListener('cloud-init', restoreSession, {once:true});
</script>
</body>
</html>
